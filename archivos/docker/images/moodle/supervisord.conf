[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:ssh]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
priority=10

[program:apache2]
command=/usr/sbin/apache2ctl -D FOREGROUND
autostart=true
autorestart=true
priority=20
stdout_logfile=/var/log/apache2/stdout.log
stderr_logfile=/var/log/apache2/stderr.log

[program:vsftpd]
command=/usr/sbin/vsftpd /etc/vsftpd.conf
autostart=true
autorestart=true
priority=30
