# ==========================================
# CONFIGURACION VSFTPD - SERVICIO INVENTARIO
# ==========================================

# 1. Ajustes Basicos
listen=YES
listen_ipv6=NO
connect_from_port_20=YES
use_localtime=YES
ftpd_banner=Bienvenido al FTP de Inventario (ASI-242V)

# 2. Control de Acceso
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022
userlist_enable=YES
userlist_deny=NO
userlist_file=/etc/vsftpd.userlist

# 3. Jaula y Rutas
chroot_local_user=YES
allow_writeable_chroot=YES
local_root=/var/www

# 4. Modo Pasivo (Rango Inventario)
pasv_enable=YES
pasv_address=172.16.24.77
pasv_min_port=40011
pasv_max_port=40015
pasv_addr_resolve=NO

# 5. Configuracion SSL/TLS
ssl_enable=YES
allow_anon_ssl=NO
force_local_data_ssl=YES
force_local_logins_ssl=YES
ssl_tlsv1=YES
ssl_sslv2=NO
ssl_sslv3=NO
require_ssl_reuse=NO
ssl_ciphers=HIGH

# Rutas de los certificados (mapeados en /etc/ssl/certs_custom)
rsa_cert_file=/etc/ssl/certs_custom/asi-242v.cifpaviles.com-cert.crt
rsa_private_key_file=/etc/ssl/certs_custom/asi-242v.cifpaviles.com-private-key.pem
ca_certs_file=/etc/ssl/certs_custom/asi-242v.cifpaviles.com-ca.crt

# 6. Registro de Logs
xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log
xferlog_std_format=YES
