<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - ASI 242V</title>
    <style>
        /* Importamos una fuente estilo pixel de Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            font-family: 'Press Start 2P', monospace; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            /* Fondo a cuadros estilo pixel (colores hierba originales de Minecraft) */
            background-color: #5c8e32;
            background-image: 
                linear-gradient(45deg, #4d7729 25%, transparent 25%, transparent 75%, #4d7729 75%, #4d7729),
                linear-gradient(45deg, #4d7729 25%, #5c8e32 25%, #5c8e32 75%, #4d7729 75%, #4d7729);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }

        h1 { 
            color: #ffffff; 
            font-size: 28px; 
            margin-bottom: 60px;
            /* Sombra negra definida estilo retro para que resalte sobre el verde */
            text-shadow: 4px 4px 0px #000000;
            text-align: center;
            line-height: 1.5;
        }

        /* Estructura en lista vertical centrada sin contenedor gris */
        .links { 
            display: flex;
            flex-direction: column;
            gap: 60px; 
            align-items: center;
        }

        /* Cada fila ahora es un bloque interactivo completo */
        .row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px; 
            text-decoration: none; 
            transition: transform 0.3s ease; 
            cursor: pointer;
        }

        /* Enlaces: texto negro y mayúsculas */
        a { 
            text-decoration: none; 
            color: #000000; 
            font-size: 24px;
            text-transform: uppercase;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        /* Fotos grandes (200px) y con el brillo blanco */
        .pixel-art {
            width: 200px;
            height: 200px;
            object-fit: contain;
            image-rendering: pixelated; 
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.95)) drop-shadow(0 0 30px rgba(255, 255, 255, 0.7));
            transition: filter 0.3s ease;
        }

        /* EFECTO HOVER: Cuando pasas el ratón por encima de la FILA entera */
        .row:hover {
            transform: scale(1.1); 
        }

        .row:hover a {
            color: #ffffff; 
            text-shadow: 4px 4px 0px #000000; 
        }

        .row:hover .pixel-art {
            /* Intensifica el brillo blanco de la foto en el hover */
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 1)) drop-shadow(0 0 40px rgba(255, 255, 255, 0.9));
        }
    </style>
</head>
<body>

    <h1>SERVICIOS ASI-242V</h1>
    
    <div class="links">
        
        <a href="https://wordpress.asi-242v.cifpaviles.com" class="row">
            <img src="wordpress.png" alt="" class="pixel-art">
            <span>WordPress</span>
        </a>

        <a href="https://moodle.asi-242v.cifpaviles.com" class="row">
            <span>Moodle</span>
            <img src="moodle.png" alt="" class="pixel-art">
        </a>

        <a href="https://inventario.asi-242v.cifpaviles.com" class="row">
            <img src="inventario.png" alt="" class="pixel-art">
            <span>Inventario</span>
        </a>

    </div>

</body>
</html>
