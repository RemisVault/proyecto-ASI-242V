# ------------------------------------------------------------
# moodle.asi-242v.cifpaviles.com, www.moodle.asi-242v.cifpaviles.com
# ------------------------------------------------------------



map $scheme $hsts_header {
    https   "max-age=63072000;includeSubDomains; preload";
}

server {
  set $forward_scheme http;
  set $server         "192.168.100.30";
  set $port           80;

  listen 80;
#listen [::]:80;

listen 443 ssl;
#listen [::]:443;


  server_name moodle.asi-242v.cifpaviles.com www.moodle.asi-242v.cifpaviles.com;

  http2 on;


  # Custom SSL
  ssl_certificate /data/custom_ssl/npm-7/fullchain.pem;
  ssl_certificate_key /data/custom_ssl/npm-7/privkey.pem;








  # HSTS (ngx_http_headers_module is required) (63072000 seconds = 2 years)
  add_header Strict-Transport-Security $hsts_header always;





    # Force SSL
    
    set $trust_forwarded_proto "F";
    
    include conf.d/include/force-ssl.conf;





  access_log /data/logs/proxy-host-1_access.log proxy;
  error_log /data/logs/proxy-host-1_error.log warn;

location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass $forward_scheme://$server:$port;
}





  # Custom
  include /data/nginx/custom/server_proxy[.]conf;
}
