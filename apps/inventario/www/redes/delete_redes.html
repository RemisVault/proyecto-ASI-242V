<html lang="es">

    <title>Eliminar Redes</title>

<body>

<center>

    <h2>Eliminar Red</h2>

    <p style="color:red;">
        Esta acción eliminará la red de forma permanente
    </p>

    <form method="post" action="delete_redes.php">

        <label for="nombre_red">Nombre de la red:</label>

        <input type="text"
               id="nombre_red"

    </form>

    <p><a href="index.php">Volver al menú de Redes</a></p>
